apiVersion: apps/v1
kind: Deployment
metadata:
  name: invoicing-identityservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invoicing-identityservice
  paused: true
  template:
    metadata:
      labels:
        app: invoicing-identityservice
    spec:
      containers:
        - name: invoicing-identityservice
          image: invoicing-identityservice
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: identity-service-config
            - configMapRef:
                name: identity-service-url-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: invoicing-identityservice
spec:
  selector:
    app: invoicing-identityservice
  ports:
    - port: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-service-url-config
data:
  BaseUrls__Frontend: https://invoicing.sdsoftware.be